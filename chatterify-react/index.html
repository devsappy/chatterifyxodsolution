    <!-- Organization + LocalBusiness JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Chatterify",
      "alternateName": "Chatterify Webdesign Agentur",
      "url": "https://chatterify.in",
      "logo": "https://chatterify.in/logo.png",
      "description": "Professionelle Webdesign Agentur für Österreich und Deutschland. Website-Erstellung, SEO-Optimierung, KI-Chatbots und Voice Agents für Unternehmen im DACH-Raum.",
      "email": "hello@chatterify.in",
      "areaServed": [
        {
          "@type": "Country",
          "name": "Austria",
          "alternateName": "Österreich"
        },
        {
          "@type": "Country",
          "name": "Germany",
          "alternateName": "Deutschland"
        },
        {
          "@type": "Country",
          "name": "Switzerland",
          "alternateName": "Schweiz"
        }
      ],
      "serviceType": [
        "Webdesign",
        "Website-Erstellung",
        "SEO-Optimierung",
        "E-Commerce Entwicklung",
        "KI-Chatbot Integration",
        "Voice Agent Entwicklung",
        "Business Automation"
      ],
      "knowsLanguage": ["de", "en"],
      "priceRange": "$$",
      "sameAs": [],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Webdesign & KI-Lösungen",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Premium Webdesign & Website-Erstellung",
              "description": "Individuelle, responsive und SEO-optimierte Websites für Unternehmen in Österreich und Deutschland."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Chatbot Integration",
              "description": "Intelligente Chatbots für automatisierten Kundensupport und Lead-Generierung."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Voice Agents",
              "description": "KI-gestützte Sprachautomatisierung für eingehende und ausgehende Anrufe."
            }
          }
        ]
      }
    }
    </script>

    <!-- WebSite schema for sitelinks search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Chatterify",
      "url": "https://chatterify.in",
      "inLanguage": "de",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://chatterify.in/blogs?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
